<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verdict</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans, system-ui, -apple-system, sans-serif);
  background: var(--color-background-primary, #1a1b26);
  color: var(--color-text-primary, #c0caf5);
  line-height: 1.4; padding: 16px;
  -webkit-font-smoothing: antialiased;
}
.header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.repo { font-size: var(--font-heading-lg-size, 18px); font-weight: var(--font-weight-semibold, 600); color: var(--color-text-info, #7aa2f7); }
.tag { font-size: var(--font-text-xs-size, 11px); color: var(--color-text-tertiary, #565f89); padding: 2px 8px; background: var(--color-background-secondary, #24283b); border-radius: var(--border-radius-xs, 4px); }
.archived { background: color-mix(in srgb, var(--color-text-danger, #f7768e) 15%, transparent); color: var(--color-text-danger, #f7768e); font-weight: var(--font-weight-semibold, 600); }
.hero { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
.score { font-size: 52px; font-weight: 800; line-height: 1; font-variant-numeric: tabular-nums; }
.badge { font-size: var(--font-text-xs-size, 12px); font-weight: var(--font-weight-bold, 700); letter-spacing: 0.5px; text-transform: uppercase; padding: 4px 14px; border-radius: var(--border-radius-full, 9999px); }
.safe .score { color: var(--color-text-success, #9ece6a); }
.safe .badge { background: color-mix(in srgb, var(--color-text-success, #9ece6a) 15%, transparent); color: var(--color-text-success, #9ece6a); }
.caution .score { color: var(--color-text-warning, #e0af68); }
.caution .badge { background: color-mix(in srgb, var(--color-text-warning, #e0af68) 15%, transparent); color: var(--color-text-warning, #e0af68); }
.risky .score { color: var(--color-text-danger, #f7768e); }
.risky .badge { background: color-mix(in srgb, var(--color-text-danger, #f7768e) 15%, transparent); color: var(--color-text-danger, #f7768e); }
.bars { display: flex; flex-direction: column; gap: 8px; }
.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-label { width: 110px; flex-shrink: 0; font-size: var(--font-text-xs-size, 12px); color: var(--color-text-secondary, #a9b1d6); }
.bar-track { flex: 1; height: 7px; background: var(--color-background-secondary, #24283b); border-radius: var(--border-radius-xs, 4px); overflow: hidden; }
.bar-fill { height: 100%; border-radius: var(--border-radius-xs, 4px); transition: width 0.5s ease; }
.bar-val { width: 28px; text-align: right; flex-shrink: 0; font-size: var(--font-text-xs-size, 12px); font-weight: var(--font-weight-medium, 500); color: var(--color-text-tertiary, #565f89); font-variant-numeric: tabular-nums; }
.sk { animation: pulse 1.5s ease-in-out infinite; }
.sk-l { height: 10px; border-radius: 6px; background: var(--color-background-secondary, #24283b); margin-bottom: 10px; }
.sk-b { height: 52px; width: 120px; border-radius: 8px; background: var(--color-background-secondary, #24283b); margin: 12px 0 20px; }
.w50 { width: 50%; } .w30 { width: 30%; } .w80 { width: 80%; } .w70 { width: 70%; } .w90 { width: 90%; }
@keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.7; } }
</style>
</head>
<body>
<div id="app">
  <div class="sk">
    <div class="sk-l w50"></div><div class="sk-b"></div>
    <div class="sk-l w90"></div><div class="sk-l w70"></div><div class="sk-l w80"></div>
    <div class="sk-l w90"></div><div class="sk-l w70"></div><div class="sk-l w80"></div>
  </div>
</div>
<script type="module" src="./verdict.ts"></script>
</body>
</html>
