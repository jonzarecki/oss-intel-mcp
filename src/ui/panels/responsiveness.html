<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsiveness</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans, system-ui, -apple-system, sans-serif);
  background: var(--color-background-primary, #1a1b26);
  color: var(--color-text-primary, #c0caf5);
  line-height: 1.4; padding: 16px;
  -webkit-font-smoothing: antialiased;
}
.repo-name {
  font-size: var(--font-text-sm-size, 14px);
  color: var(--color-text-info, #7aa2f7);
  font-weight: var(--font-weight-semibold, 600);
  margin-bottom: 16px;
}
.gauges {
  display: flex; gap: 16px; margin-bottom: 16px;
}
.gauge {
  flex: 1;
  background: var(--color-background-secondary, #24283b);
  border-radius: var(--border-radius-md, 8px);
  padding: 16px; text-align: center;
}
.gauge svg { display: block; margin: 0 auto 8px; }
.gauge-val {
  font-size: var(--font-heading-lg-size, 20px);
  font-weight: var(--font-weight-bold, 700);
  line-height: 1;
}
.gauge-lbl {
  font-size: var(--font-text-xs-size, 11px);
  color: var(--color-text-tertiary, #565f89);
  text-transform: uppercase; letter-spacing: 0.3px;
  margin-top: 4px;
}
.gauge-sub {
  font-size: var(--font-text-xs-size, 11px);
  color: var(--color-text-tertiary, #565f89);
  margin-top: 2px;
}
.stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
}
.stat {
  background: var(--color-background-secondary, #24283b);
  border-radius: var(--border-radius-md, 8px);
  padding: 12px; text-align: center;
}
.stat-val {
  font-size: var(--font-heading-lg-size, 20px);
  font-weight: var(--font-weight-bold, 700);
  font-variant-numeric: tabular-nums;
}
.stat-lbl {
  font-size: var(--font-text-xs-size, 11px);
  color: var(--color-text-tertiary, #565f89);
  text-transform: uppercase; letter-spacing: 0.3px;
  margin-top: 2px;
}
@media (max-width: 360px) {
  .gauges { flex-direction: column; }
  .stats { grid-template-columns: 1fr 1fr; }
}

.sk { animation: pulse 1.5s ease-in-out infinite; }
.sk-l { height: 10px; border-radius: 6px; background: var(--color-background-secondary, #24283b); margin-bottom: 10px; }
.sk-b { height: 80px; border-radius: 8px; background: var(--color-background-secondary, #24283b); margin-bottom: 12px; }
.sk-row { display: flex; gap: 12px; margin-bottom: 12px; }
.sk-row > div { flex: 1; }
.w40 { width: 40%; }
@keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.7; } }
</style>
</head>
<body>
<div id="app">
  <div class="sk">
    <div class="sk-l w40"></div>
    <div class="sk-row"><div class="sk-b"></div><div class="sk-b"></div></div>
    <div class="sk-row"><div class="sk-b" style="height:50px"></div><div class="sk-b" style="height:50px"></div><div class="sk-b" style="height:50px"></div></div>
  </div>
</div>
<script type="module" src="./responsiveness.ts"></script>
</body>
</html>
